x-airflow-common: &airflow-common
  image: apache/airflow:3.1.8
  environment: &airflow-common-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/data_cloud
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-this_is_a_long_shared_jwt_secret_for_local_dev_only_change_me_2026}
    AIRFLOW_CONN_POSTGRES_DEFAULT: postgres://airflow:airflow@postgres:5432/data_cloud
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
    OPENAI_API_KEY: ${OPENAI_API_KEY}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./requirement.txt:/opt/airflow/requirement.txt:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    - postgres

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=data_cloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d data_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: bash -c "pip install -r /opt/airflow/requirement.txt && airflow version"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

  airflow-webserver:
    <<: *airflow-common
    command: bash -c "pip install -r /opt/airflow/requirement.txt && airflow api-server"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: bash -c "pip install -r /opt/airflow/requirement.txt && airflow scheduler"

  airflow-dag-processor:
    <<: *airflow-common
    command: bash -c "pip install -r /opt/airflow/requirement.txt && airflow dag-processor"

  crm:
    build:
      context: ./crm
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./crm/uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/data_cloud
    depends_on:
      postgres:
        condition: service_healthy

  crm-backend:
    build:
      context: ./crm_backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/data_cloud
      SPRING_DATASOURCE_USERNAME: airflow
      SPRING_DATASOURCE_PASSWORD: airflow
    depends_on:
      postgres:
        condition: service_healthy

  rag-engine:
    build:
      context: ./rag_engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./rag_engine:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: